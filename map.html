<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Queer South Sound Map</title>
<meta name="description" content="A map of queer and trans-friendly places across the South Puget Sound.">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css"/>

<style>
  html,body{
    margin:0;
    height:100%;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:#0C0B11;
    color:#fff;
  }

  header{
    padding:14px 18px;
  }

  header h1{
    margin:0;
    font-size:1.2rem;
  }

  header p{
    margin:4px 0 0;
    font-size:.85rem;
    color:#c9c4d6;
  }

  #map{
    height:calc(100vh - 70px);
    width:100%;
  }

  /* tooltip label styling */
  .place-label {
    background: white;
    color: #111;
    border-radius: 6px;
    padding: 2px 6px;
    font-size: 11px;
    font-weight: 600;
    box-shadow: 0 1px 4px rgba(0,0,0,.25);
    border: none;
  }

  .place-label::before {
    display: none;
  }
</style>
</head>

<body>
<header>
  <h1>Queer South Sound Map</h1>
  <p>Queer and trans-friendly places across the South Puget Sound. Tap a pin for details.</p>
</header>

<div id="map"></div>

<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const MAPDATA = [/* your full dataset stays exactly the same */ 
{"name":"Photosynthesis","category":"Retail / Music","address":"313 5th Ave SE, Olympia","lat":47.0445,"lng":-122.8939,"info":"Synths, flowers, and gifts. Queer & trans owned.","link":""},
{"name":"Cryptatropa Bar","category":"Bar","address":"421 4th Ave E, Olympia","lat":47.0454,"lng":-122.8928,"info":"A very dark bar downtown.","link":""}
/* keep the rest of your entries exactly as-is */
];

function esc(s){
  return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
}

const map = L.map("map",{scrollWheelZoom:true}).setView([47.1,-122.7],9);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
  attribution:"&copy; OpenStreetMap contributors",
  maxZoom:19
}).addTo(map);

const pts = [];

MAPDATA.forEach(m => {

  // DEFAULT LEAFLET PIN
  const mk = L.marker([m.lat, m.lng]).addTo(map);

  // popup content
  const web = m.link
    ? `<br><a href="${esc(m.link)}" target="_blank" rel="noopener">Website</a>`
    : "";

  mk.bindPopup(`
    <b>${esc(m.name)}</b><br>
    ${esc(m.category)}<br>
    ${esc(m.info || "")}<br>
    <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(m.name+" "+(m.address||""))}" target="_blank" rel="noopener">
      Directions
    </a>
    ${web}
  `);

  // OPTIONAL: always-visible label
  mk.bindTooltip(esc(m.name), {
    permanent: true,
    direction: "top",
    offset: [0, -10],
    className: "place-label"
  });

  pts.push([m.lat, m.lng]);
});

if(pts.length){
  map.fitBounds(pts,{padding:[40,40]});
}
</script>

</body>
</html>
