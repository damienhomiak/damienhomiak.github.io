<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Queer South Sound Map</title>
<meta name="description" content="A map of queer and trans-friendly places across the South Puget Sound.">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  html,body{margin:0;height:100%;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0C0B11;color:#fff}
  header{padding:14px 18px}
  header h1{margin:0;font-size:1.2rem}
  header p{margin:4px 0 0;font-size:.85rem;color:#c9c4d6}
  #map{height:calc(100vh - 70px);width:100%}
  .pin-dot{width:16px;height:16px;border-radius:50%;background:#8A5CF6;border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4)}
  .leaflet-tooltip.pinlabel{background:#fff;color:#15131c;border:none;border-radius:7px;padding:2px 7px;font-size:12px;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.3)}
</style>
</head>
<body>
<header>
  <h1>Queer South Sound Map</h1>
  <p>Queer and trans-friendly places across the South Puget Sound. Tap a pin for details.</p>
</header>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

t": 47.0448, "lng": -122.8997, "info": "Body piercing studio.", "link": ""}, {"name": "Forge Body Piercing", "category": "Piercing", "address": "316 Capitol Way N, Olympia, WA", "lat": 47.0472, "lng": -122.9018, "info": "Worker-owned piercing co-op.", "link": ""}, {"name": "Redpup Tattoo", "category": "Tattoo & piercing", "address": "7221 Martin Way E, Lacey, WA", "lat": 47.052, "lng": -122.7842, "info": "Tattoo and piercing in Lacey.", "link": ""}, {"name": "Handworkers Studio", "category": "Tattoo", "address": "2938 Limited Ln NW, Olympia, WA", "lat": 47.0481, "lng": -122.9377, "info": "Private, welcoming tattoo studio.", "link": ""}, {"name": "Sorry Mom Ink", "category": "Tattoo", "address": "8120 Freedom Ln NE, Lacey, WA", "lat": 47.0617, "lng": -122.7687, "info": "LGBTQ-friendly tattoo shop, walk-ins welcome.", "link": ""}, {"name": "Gatsby Parlour de Beauté", "category": "Hair salon", "address": "201 4th Ave E, Olympia, WA", "lat": 47.0449, "lng": -122.9002, "info": "Downtown hair salon.", "link": ""}, {"name": "Premiere Salon & Spa", "category": "Salon & spa", "address": "111 Market St NE, Olympia, WA", "lat": 47.0499, "lng": -122.9021, "info": "Full-service salon and spa.", "link": ""}, {"name": "Shear Barber Studio", "category": "Barber", "address": "414 5th Ave SW, Olympia, WA", "lat": 47.0439, "lng": -122.9061, "info": "Queer-friendly barber studio.", "link": ""}, {"name": "The Stone & Steel Barbershop", "category": "Barber", "address": "1222 S 2nd Ave SW, Tumwater, WA", "lat": 47.0045, "lng": -122.9102, "info": "Inclusive barber in Tumwater.", "link": ""}, {"name": "The Barber Collective", "category": "Barber", "address": "1001 S Yakima Ave, Tacoma, WA", "lat": 47.253, "lng": -122.4471, "info": "LGBTQ2IA+ barbershop in the Tacoma Armory.", "link": ""}, {"name": "Seawolf Barbershop", "category": "Barber", "address": "2525 Tacoma Ave S, Tacoma, WA", "lat": 47.2375, "lng": -122.4407, "info": "LGBTQ+ friendly barbershop.", "link": ""}, {"name": "Supernova Barber Shop & Hair Salon", "category": "Salon & barber", "address": "817 Division Ave, Tacoma, WA", "lat": 47.2624, "lng": -122.451, "info": "Funky, inclusive salon and barbershop.", "link": ""}, {"name": "Juniper Botanical Bar", "category": "Bar & nightlife", "address": "5226 S Tacoma Way, Tacoma, WA", "lat": 47.2088, "lng": -122.4841, "info": "Queer-owned cocktail and botanical bar with food and drag shows.", "link": ""}, {"name": "The Flipped Pot Ceramics Studio", "category": "Ceramics studio", "address": "317 4th Ave E #101, Olympia, WA", "lat": 47.045, "lng": -122.8984, "info": "Open-access ceramics studio for all levels.", "link": "https://www.flippedpot.com/"}, {"name": "Farm + Flourish", "category": "Local grocery", "address": "106A N Tower Ave, Centralia, WA", "lat": 46.7164, "lng": -122.9541, "info": "Queer-owned local grocery and farm-fresh food.", "link": "https://farmnflourish.com/"}];
function esc(s){return (s||"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}
const map=L.map("map",{scrollWheelZoom:true}).setView([47.1,-122.7],9);
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{attribution:"&copy; OpenStreetMap contributors",maxZoom:19}).addTo(map);
const ic=L.divIcon({html:'<div class="pin-dot"></div>',className:"",iconSize:[16,16],iconAnchor:[8,8]});
const pts=[];
MAPDATA.forEach(m=>{const mk=L.marker([m.lat,m.lng],{icon:ic}).addTo(map);
  mk.bindTooltip(esc(m.name),{className:"pinlabel",direction:"top",offset:[0,-6]});
  const web=m.link?`<br><a href="${esc(m.link)}" target="_blank" rel="noopener">Website</a>`:"";
  mk.bindPopup(`<b>${esc(m.name)}</b><br>${esc(m.category)}<br>${esc(m.info||"")}<br><a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(m.name+" "+(m.address||""))}" target="_blank" rel="noopener">Directions</a>${web}`);
  pts.push([m.lat,m.lng]);});
if(pts.length)map.fitBounds(pts,{padding:[40,40]});
</script>
</body>
</html>
